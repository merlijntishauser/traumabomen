version: 2

updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: monthly

  # Root docker-compose.yml image tags (postgres, mailpit, and the Playwright
  # e2e image). Weekly so the Playwright image tracks the weekly @playwright/test
  # npm bump: a drift between the two fails e2e with "Executable doesn't exist".
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
