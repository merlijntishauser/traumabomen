name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-fe:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx @biomejs/biome ci src/

  lint-be:
    name: Lint backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - run: uv run ruff check app/
      - run: uv run ruff format --check app/

  typecheck-fe:
    name: Typecheck frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc -b

  typecheck-be:
    name: Typecheck backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - run: uv run mypy app

  quality-be:
    name: Quality gate (backend)
    needs: [lint-be, typecheck-be]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: traumabomen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    defaults:
      run:
        working-directory: api
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/traumabomen_test
      JWT_SECRET_KEY: test-secret-key-for-ci
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - name: Complexity check (xenon)
        run: uv run xenon app/ --max-absolute B --max-modules B --max-average A
      - name: Coverage
        run: uv run pytest --cov=app --cov-report=json -q
      - name: Coverage gate
        working-directory: .
        run: bash scripts/coverage-gate.sh python

  quality-fe:
    name: Quality gate (frontend)
    needs: [lint-fe, typecheck-fe]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Complexity check (eslint/sonarjs)
        run: npx eslint src/
      - name: Unit tests (fast, no DOM)
        run: npx vitest run --project unit
      - name: All tests with coverage
        run: npx vitest run --coverage
      - name: Coverage gate
        working-directory: .
        run: bash scripts/coverage-gate.sh typescript

  e2e:
    name: E2E tests
    needs: [lint-fe, lint-be, typecheck-fe, typecheck-be]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create .env
        run: cp .env.example .env
      - name: Start services
        run: docker compose up -d --build
      - name: Wait for services
        run: |
          docker compose exec -T db sh -c 'until pg_isready -U traumabomen; do sleep 1; done'
          sleep 5
      - name: Run migrations
        run: docker compose exec -T api uv run alembic upgrade head
      - name: Run e2e tests
        run: make e2e
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7
      - name: Stop services
        if: always()
        run: docker compose --profile e2e down -v

  privacy-scan:
    name: Privacy scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/privacy-scan.sh
