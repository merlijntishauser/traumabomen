services:
  db:
    image: postgres:17-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      target: dev
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ENABLE_TEST_RESET=true
      - REQUIRE_EMAIL_VERIFICATION=${REQUIRE_EMAIL_VERIFICATION:-false}
    depends_on:
      db:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file: .env
    command: npx vite dev --host

  e2e:
    image: mcr.microsoft.com/playwright:v1.49.0-noble
    working_dir: /app
    volumes:
      - ./frontend:/app
      - e2e_node_modules:/app/node_modules
    depends_on:
      - frontend
      - api
    profiles:
      - e2e

volumes:
  pgdata:
  e2e_node_modules:
