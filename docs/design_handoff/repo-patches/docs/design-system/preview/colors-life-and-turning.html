<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Life events &amp; turning points</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="stack" style="gap: 14px;">
        <div class="eyebrow">Domain · life events</div>
        <div class="row" style="gap: 6px;">
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(96,165,250,0.12); color: #60a5fa; border-radius: 4px;">▲ Family</div>
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(167,139,250,0.12); color: #a78bfa; border-radius: 4px;">▲ Education</div>
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(251,191,36,0.12); color: #fbbf24; border-radius: 4px;">▲ Career</div>
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(45,212,191,0.12); color: #2dd4bf; border-radius: 4px;">▲ Relocation</div>
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(244,114,182,0.12); color: #f472b6; border-radius: 4px;">▲ Health</div>
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(34,211,238,0.12); color: #22d3ee; border-radius: 4px;">▲ Medication</div>
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(148,163,184,0.12); color: #94a3b8; border-radius: 4px;">▲ Other</div>
        </div>
        <div class="divider"></div>
        <div class="eyebrow">Domain · turning points</div>
        <div class="row" style="gap: 6px;">
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.3); border-radius: 4px;">◆ Cycle-breaking</div>
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(96,165,250,0.12); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); border-radius: 4px;">◆ Protective relationship</div>
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); border-radius: 4px;">◆ Recovery</div>
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); border-radius: 4px;">◆ Achievement</div>
          <div style="display: inline-flex; gap: 6px; align-items: center; font-size: 13px; padding: 4px 10px; background: rgba(45,212,191,0.12); color: #2dd4bf; border: 1px solid rgba(45,212,191,0.3); border-radius: 4px;">◆ Positive change</div>
        </div>
      </div>
    </div>
  </body>
</html>
