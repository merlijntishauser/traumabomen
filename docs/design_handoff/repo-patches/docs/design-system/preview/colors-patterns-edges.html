<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pattern annotations &amp; tree edges</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="stack" style="gap: 14px;">
        <div>
          <div class="eyebrow">Pattern overlay rotation</div>
          <div class="muted" style="margin-top: 4px;">8-color rotation for user-created annotations on the timeline / canvas.</div>
        </div>
        <div class="row" style="gap: 0;">
          <div style="flex: 1; height: 56px; background: #818cf8; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; color: rgba(0,0,0,0.6); font-weight: 700;">0</div>
          <div style="flex: 1; height: 56px; background: #f472b6; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; color: rgba(0,0,0,0.6); font-weight: 700;">1</div>
          <div style="flex: 1; height: 56px; background: #fb923c; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; color: rgba(0,0,0,0.6); font-weight: 700;">2</div>
          <div style="flex: 1; height: 56px; background: #facc15; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; color: rgba(0,0,0,0.6); font-weight: 700;">3</div>
          <div style="flex: 1; height: 56px; background: #34d399; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; color: rgba(0,0,0,0.6); font-weight: 700;">4</div>
          <div style="flex: 1; height: 56px; background: #38bdf8; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; color: rgba(0,0,0,0.6); font-weight: 700;">5</div>
          <div style="flex: 1; height: 56px; background: #a78bfa; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; color: rgba(0,0,0,0.6); font-weight: 700;">6</div>
          <div style="flex: 1; height: 56px; background: #f87171; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; color: rgba(0,0,0,0.6); font-weight: 700;">7</div>
        </div>
        <div class="divider"></div>
        <div class="eyebrow">Tree edges (relationship types)</div>
        <div class="row" style="gap: 18px;">
          <div class="row" style="gap: 6px;"><span style="width: 28px; height: 2px; background: #8faa97;"></span><span class="token">--color-edge-default</span></div>
          <div class="row" style="gap: 6px;"><span style="width: 28px; height: 2px; background: #ec4899;"></span><span class="token">--color-edge-partner</span></div>
          <div class="row" style="gap: 6px;"><span style="width: 28px; height: 2px; background: #a855f7;"></span><span class="token">--color-edge-half-sibling</span></div>
          <div class="row" style="gap: 6px;"><span style="width: 28px; height: 2px; background: #5a7a64;"></span><span class="token">--color-edge-step</span></div>
          <div class="row" style="gap: 6px;"><span style="width: 28px; height: 2px; background: #e8863a;"></span><span class="token">--color-edge-friend</span></div>
        </div>
      </div>
    </div>
  </body>
</html>
