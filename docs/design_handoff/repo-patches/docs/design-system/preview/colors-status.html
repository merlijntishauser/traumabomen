<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Status colors</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="stack" style="gap: 14px;">
        <div class="eyebrow">Status colors</div>
        <div class="row" style="gap: 10px;">
          <div style="flex: 1; padding: 10px 12px; font-size: 13px; color: #ef4444; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 6px;">Danger · #ef4444</div>
          <div style="flex: 1; padding: 10px 12px; font-size: 13px; color: #f59e0b; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); border-radius: 6px;">Warning · #f59e0b</div>
        </div>
        <div class="row" style="gap: 10px;">
          <div style="flex: 1; padding: 10px 12px; font-size: 13px; color: #22c55e; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 6px;">Success · #22c55e</div>
          <div style="flex: 1; padding: 10px 12px; font-size: 13px; color: #38bdf8; background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3); border-radius: 6px;">Info · #38bdf8</div>
        </div>
        <div class="muted" style="margin-top: 4px;">Status uses 10% bg + 30% border ring; never solid fills (except destructive buttons → --color-danger-solid #b91c1c).</div>
      </div>
    </div>
  </body>
</html>
