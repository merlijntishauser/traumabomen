<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Surfaces — dark</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="stack" style="gap: 18px;">
        <div>
          <div class="eyebrow">Surfaces · dark theme (default)</div>
          <div class="muted" style="margin-top: 4px;">Forest at dusk. Near-black floor; deeper green canvas; mossy borders.</div>
        </div>
        <div class="row" style="gap: 14px;">
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #0a1a0f;"></div>
            <div class="token">--color-bg-primary</div>
            <div class="muted">#0a1a0f</div>
          </div>
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #0d1f14;"></div>
            <div class="token">--color-bg-canvas</div>
            <div class="muted">#0d1f14</div>
          </div>
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #0f261a;"></div>
            <div class="token">--color-bg-secondary</div>
            <div class="muted">#0f261a</div>
          </div>
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #163027;"></div>
            <div class="token">--color-bg-tertiary</div>
            <div class="muted">#163027</div>
          </div>
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #1a3d2a;"></div>
            <div class="token">--color-bg-hover</div>
            <div class="muted">#1a3d2a</div>
          </div>
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #1f4d35;"></div>
            <div class="token">--color-border-primary</div>
            <div class="muted">#1f4d35</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
