<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Surfaces — light</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="stack" style="gap: 18px;">
        <div>
          <div class="eyebrow">Surfaces · light theme</div>
          <div class="muted" style="margin-top: 4px;">Warm cream stack — paper, never bright white.</div>
        </div>
        <div class="row" style="gap: 14px;">
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #f7f5f2;"></div>
            <div class="token">--color-bg-primary</div>
            <div class="muted">#f7f5f2</div>
          </div>
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #f4f1ed;"></div>
            <div class="token">--color-bg-canvas</div>
            <div class="muted">#f4f1ed</div>
          </div>
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #ffffff;"></div>
            <div class="token">--color-bg-secondary</div>
            <div class="muted">#ffffff</div>
          </div>
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #f0edea;"></div>
            <div class="token">--color-bg-tertiary</div>
            <div class="muted">#f0edea</div>
          </div>
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #ebe7e2;"></div>
            <div class="token">--color-bg-hover</div>
            <div class="muted">#ebe7e2</div>
          </div>
          <div class="stack" style="gap: 6px; align-items: center;">
            <div class="swatch" style="background: #d4cec6;"></div>
            <div class="token">--color-border-primary</div>
            <div class="muted">#d4cec6</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
