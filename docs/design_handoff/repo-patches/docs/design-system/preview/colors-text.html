<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Text colors</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="stack" style="gap: 14px;">
        <div class="eyebrow">Text · dark theme</div>
        <div class="stack" style="gap: 10px;">
          <div class="row">
            <div style="width: 22px; height: 22px; background: #e0e8e3; border-radius: 4px;"></div>
            <div style="color: #e0e8e3; font-size: 15px;">Primary — body and serif headings</div>
            <div class="token" style="margin-left: auto;">--color-text-primary · #e0e8e3</div>
          </div>
          <div class="row">
            <div style="width: 22px; height: 22px; background: #8faa97; border-radius: 4px;"></div>
            <div style="color: #8faa97; font-size: 15px;">Secondary — labels and supporting copy</div>
            <div class="token" style="margin-left: auto;">--color-text-secondary · #8faa97</div>
          </div>
          <div class="row">
            <div style="width: 22px; height: 22px; background: #7a9a84; border-radius: 4px;"></div>
            <div style="color: #7a9a84; font-size: 15px;">Muted — hints, captions, eyebrows</div>
            <div class="token" style="margin-left: auto;">--color-text-muted · #7a9a84</div>
          </div>
          <div class="row">
            <div style="width: 22px; height: 22px; background: #2d8a5e; border-radius: 4px;"></div>
            <div style="color: #2d8a5e; font-size: 15px;">Accent — links and focused fields</div>
            <div class="token" style="margin-left: auto;">--color-accent · #2d8a5e</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
