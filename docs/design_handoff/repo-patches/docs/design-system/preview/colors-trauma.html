<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Trauma categories</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="stack" style="gap: 14px;">
        <div>
          <div class="eyebrow">Domain · trauma categories</div>
          <div class="muted" style="margin-top: 4px;">Marker fills on canvas nodes, dots on the timeline, chips on person cards.</div>
        </div>
        <div class="row" style="gap: 8px; row-gap: 8px;">
          <div class="row" style="gap: 8px; padding: 5px 12px; background: rgba(129,140,248,0.12); border: 1px solid rgba(129,140,248,0.3); border-radius: 4px;">
            <span style="width: 9px; height: 9px; border-radius: 50%; background: #818cf8;"></span>
            <span style="font-size: 13px; color: #818cf8;">Loss</span>
          </div>
          <div class="row" style="gap: 8px; padding: 5px 12px; background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); border-radius: 4px;">
            <span style="width: 9px; height: 9px; border-radius: 50%; background: #f87171;"></span>
            <span style="font-size: 13px; color: #f87171;">Abuse</span>
          </div>
          <div class="row" style="gap: 8px; padding: 5px 12px; background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.3); border-radius: 4px;">
            <span style="width: 9px; height: 9px; border-radius: 50%; background: #fbbf24;"></span>
            <span style="font-size: 13px; color: #fbbf24;">Addiction</span>
          </div>
          <div class="row" style="gap: 8px; padding: 5px 12px; background: rgba(168,162,158,0.12); border: 1px solid rgba(168,162,158,0.3); border-radius: 4px;">
            <span style="width: 9px; height: 9px; border-radius: 50%; background: #a8a29e;"></span>
            <span style="font-size: 13px; color: #a8a29e;">War</span>
          </div>
          <div class="row" style="gap: 8px; padding: 5px 12px; background: rgba(232,121,249,0.12); border: 1px solid rgba(232,121,249,0.3); border-radius: 4px;">
            <span style="width: 9px; height: 9px; border-radius: 50%; background: #e879f9;"></span>
            <span style="font-size: 13px; color: #e879f9;">Displacement</span>
          </div>
          <div class="row" style="gap: 8px; padding: 5px 12px; background: rgba(34,211,238,0.12); border: 1px solid rgba(34,211,238,0.3); border-radius: 4px;">
            <span style="width: 9px; height: 9px; border-radius: 50%; background: #22d3ee;"></span>
            <span style="font-size: 13px; color: #22d3ee;">Illness</span>
          </div>
          <div class="row" style="gap: 8px; padding: 5px 12px; background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.3); border-radius: 4px;">
            <span style="width: 9px; height: 9px; border-radius: 50%; background: #a78bfa;"></span>
            <span style="font-size: 13px; color: #a78bfa;">Poverty</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
