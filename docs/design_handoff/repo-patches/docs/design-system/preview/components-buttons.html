<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Buttons</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      .btn {
        font-family: var(--font-body);
        font-weight: 700;
        font-size: 13px;
        padding: 9px 16px;
        border-radius: var(--radius-sm);
        border: 1px solid transparent;
        cursor: pointer;
        line-height: 1.2;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: var(--transition-colors);
      }
      .btn-primary { background: var(--color-action); color: var(--color-text-inverse); border-color: var(--color-action); }
      .btn-primary:hover { background: var(--color-action-hover); border-color: var(--color-action-hover); }
      .btn-secondary { background: var(--color-bg-tertiary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
      .btn-secondary:hover { background: var(--color-bg-hover); }
      .btn-ghost { background: transparent; color: var(--color-text-secondary); }
      .btn-ghost:hover { background: var(--color-bg-tertiary); color: var(--color-text-primary); }
      .btn-danger { background: var(--color-danger-solid); color: #fff; border-color: var(--color-danger-solid); }
      .btn-danger:hover { background: var(--color-danger-solid-hover); border-color: var(--color-danger-solid-hover); }
      .btn-icon {
        width: 32px; height: 32px; padding: 0;
        justify-content: center;
        background: transparent; color: var(--color-text-secondary);
        border: 1px solid var(--color-border-primary); border-radius: var(--radius-sm);
        cursor: pointer; transition: var(--transition-colors);
      }
      .btn-icon:hover { background: var(--color-bg-tertiary); color: var(--color-text-primary); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="stack" style="gap: 16px;">
        <div class="eyebrow">Buttons</div>
        <div class="row" style="gap: 10px;">
          <button class="btn btn-primary">Save</button>
          <button class="btn btn-secondary">Cancel</button>
          <button class="btn btn-ghost">Skip</button>
          <button class="btn btn-danger">Delete account</button>
        </div>
        <div class="row" style="gap: 10px;">
          <button class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            Add person
          </button>
          <button class="btn btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            Open canvas
          </button>
          <button class="btn-icon" aria-label="Lock">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </button>
          <button class="btn-icon" aria-label="Theme toggle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          </button>
        </div>
        <div class="muted">Primary: filled accent green, label color = --color-text-inverse. Destructive: filled --color-danger-solid (#b91c1c). No press shrink.</div>
      </div>
    </div>
  </body>
</html>
