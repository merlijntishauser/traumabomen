<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Toolbar &amp; tabs</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      .ic { width: 14px; height: 14px; flex-shrink: 0; }
      .ic-lg { width: 16px; height: 16px; flex-shrink: 0; }
      .seg-btn { font-family: var(--font-body); font-size: 13px; font-weight: 700; padding: 6px 12px; background: transparent; color: var(--color-text-muted); border: none; border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
      .seg-btn.active { background: var(--color-bg-secondary); color: var(--color-text-primary); }
      .icon-btn { width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border-primary); border-radius: var(--radius-sm); cursor: pointer; }
      .icon-btn:hover { background: var(--color-bg-tertiary); color: var(--color-text-primary); }
      .tab { font-size: 13px; padding: 10px 16px; color: var(--color-text-secondary); display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
      .tab.active { color: var(--color-text-primary); border-bottom: 2px solid var(--color-action); margin-bottom: -1px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="stack" style="gap: 18px;">
        <div class="eyebrow">App toolbar</div>
        <div style="display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--color-bg-secondary); border: 1px solid var(--color-border-secondary); border-radius: var(--radius-md);">
          <!-- tree title with leaf -->
          <div style="display: inline-flex; align-items: center; gap: 8px;">
            <svg class="ic-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" style="color: var(--color-accent);"><path d="M11 20A7 7 0 014 13c0-5 4-9 12-11-1 6-2 9-4 11"/><path d="M11 20l-2-7"/></svg>
            <div style="font-family: var(--font-heading); font-weight: 300; font-size: 16px; color: var(--color-text-primary);">My family</div>
          </div>
          <div style="width: 1px; height: 18px; background: var(--color-border-secondary); margin: 0 2px;"></div>
          <!-- segmented view switcher -->
          <div style="display: flex; gap: 2px; padding: 2px; background: var(--color-bg-tertiary); border-radius: var(--radius-sm);">
            <button class="seg-btn active">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2"/><circle cx="6" cy="14" r="2"/><circle cx="18" cy="14" r="2"/><circle cx="9" cy="20" r="1.5"/><circle cx="15" cy="20" r="1.5"/><path d="M12 7v3M6 12V9.5l6-2 6 2V12M9 18.5l-3-2.5M15 18.5l3-2.5"/></svg>
              Tree
            </button>
            <button class="seg-btn">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M7 6v12M13 6v12M19 6v12"/></svg>
              Timeline
            </button>
            <button class="seg-btn">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7" stroke-dasharray="2 3"/><circle cx="12" cy="12" r="10" stroke-dasharray="1 4"/></svg>
              Patterns
            </button>
          </div>
          <!-- right cluster -->
          <div style="margin-left: auto; display: inline-flex; gap: 8px; align-items: center;">
            <span class="muted" style="display: inline-flex; align-items: center; gap: 6px;">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              Auto-saved · 12s
            </span>
            <button class="icon-btn" aria-label="Feedback">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            </button>
            <button class="icon-btn" aria-label="Theme toggle">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
            <button class="icon-btn" aria-label="Lock">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </button>
          </div>
        </div>
        <div class="eyebrow">Tabs · person panel</div>
        <div style="display: flex; gap: 0; border-bottom: 1px solid var(--color-border-secondary);">
          <div class="tab active">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
            Story
          </div>
          <div class="tab">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
            Photos
          </div>
          <div class="tab">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2"/><circle cx="6" cy="19" r="2"/><circle cx="18" cy="19" r="2"/><path d="M12 7v4M12 11l-6 6M12 11l6 6"/></svg>
            Connections
            <span style="font-size: 11px; padding: 1px 7px; background: var(--color-bg-tertiary); color: var(--color-text-muted); border-radius: 8px;">7</span>
          </div>
          <div class="tab">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4z"/></svg>
            Notes
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
