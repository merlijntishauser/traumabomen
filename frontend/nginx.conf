map $host $og_lang {
    "~*traumabomen"  "nl";
    default          "en";
}

map $host $og_locale {
    "~*traumabomen"  "nl_NL";
    default          "en_US";
}

map $host $og_title {
    "~*traumabomen"  "Traumabomen";
    default          "Traumatrees";
}

map $host $og_desc {
    "~*traumabomen"  "Breng intergenerationeel trauma in kaart op visuele stambomen. Jouw data blijft van jou.";
    default          "Map intergenerational trauma onto visual family trees. Your data stays yours.";
}

map $host $og_origin {
    "~*traumabomen"  "https://www.traumabomen.nl";
    default          "https://www.traumatrees.org";
}

# Same-language alternate (the EN/NL counterpart used in <link rel="alternate" hreflang>).
map $host $og_alt_en {
    default          "https://www.traumatrees.org";
}

map $host $og_alt_nl {
    default          "https://www.traumabomen.nl";
}

# Strip query string from $request_uri so the canonical doesn't fragment on
# tracking params. $uri can't be used here because try_files rewrites it to
# /index.html for every SPA route.
map $request_uri $canonical_path {
    ~^([^?]*)  $1;
    default    /;
}

limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_general:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=api_global:10m rate=120r/m;
limit_req_status 429;

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    set_real_ip_from 169.254.0.0/16;
    set_real_ip_from 10.0.0.0/8;
    real_ip_header X-Forwarded-For;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    sub_filter_once off;
    sub_filter '__OG_LANG__'      $og_lang;
    sub_filter '__OG_LOCALE__'    $og_locale;
    sub_filter '__OG_TITLE__'     $og_title;
    sub_filter '__OG_DESC__'      $og_desc;
    sub_filter '__OG_ORIGIN__'    $og_origin;
    # Use $canonical_path (request URI minus query string). $uri would resolve
    # to /index.html for every SPA route after try_files rewrites it.
    # __OG_*__ placeholders are page-scoped: they include the current path so
    # the canonical / hreflang alternates in index.html point at the page the
    # visitor actually requested.
    sub_filter '__OG_CANONICAL__' '$og_origin$canonical_path';
    sub_filter '__OG_ALT_EN__'    '$og_alt_en$canonical_path';
    sub_filter '__OG_ALT_NL__'    '$og_alt_nl$canonical_path';
    # __BASE_*__ placeholders are origin-only (no path). Used by sitemap.xml,
    # which embeds the path itself on each <url> entry.
    sub_filter '__BASE_EN__'      $og_alt_en;
    sub_filter '__BASE_NL__'      $og_alt_nl;

    location = /healthz {
        access_log off;
        return 200;
    }

    # Sitemap needs the same per-host substitution as index.html, but XML is not
    # in the default sub_filter_types — opt this single file in.
    location = /sitemap.xml {
        sub_filter_types application/xml text/xml;
        default_type application/xml;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
    }

    location ~ ^/api/auth/(login|register)$ {
        limit_req zone=auth_strict burst=3 nodelay;
        limit_req zone=api_global burst=30 nodelay;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass ${API_URL};
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/auth/ {
        limit_req zone=auth_general burst=5 nodelay;
        limit_req zone=api_global burst=30 nodelay;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass ${API_URL};
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_global burst=30 nodelay;
        proxy_pass ${API_URL}/;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
