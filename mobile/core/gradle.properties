# Share the libsodium cinterop bindings across the iOS targets from iosMain
# (the crypto actuals live there). Without this, Kotlin warns that the
# cinterop is not commonized across iosArm64 / iosSimulatorArm64.
kotlin.mpp.enableCInteropCommonization=true

# Kotlin/Native downloads its dependencies on first build; give it room.
org.gradle.jvmargs=-Xmx2g
