# xcodegen project definition (xcodegen generate -> Traumatrees.xcodeproj).
# The Xcode project file is generated, never edited by hand.
name: Traumatrees
options:
  bundleIdPrefix: org.traumabomen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"

targets:
  Traumatrees:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      # Build with: cd ../core && gradle assembleTraumabomenCoreDebugXCFramework
      - framework: ../core/build/XCFrameworks/debug/TraumabomenCore.xcframework
        embed: false
      # The core's SQLDelight native driver (SQLiter) links the system sqlite3.
      - sdk: libsqlite3.tbd
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Traumatrees
        UILaunchScreen: {}
        # The dev backend is plain HTTP on the Mac's loopback; production
        # talks HTTPS only, which ATS allows by default.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.traumabomen.companion
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_IDENTITY: "-"
