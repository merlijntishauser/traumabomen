# xcodegen project definition (xcodegen generate -> Traumatrees.xcodeproj).
# The Xcode project file is generated, never edited by hand.
name: Traumatrees
options:
  bundleIdPrefix: org.traumabomen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"

targets:
  Traumatrees:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources/Fonts
        buildPhase: resources
      - Resources/Assets.xcassets
    dependencies:
      # Build with: cd ../core && gradle assembleTraumabomenCoreDebugXCFramework
      - framework: ../core/build/XCFrameworks/debug/TraumabomenCore.xcframework
        embed: false
      # The core's SQLDelight native driver (SQLiter) links the system sqlite3.
      - sdk: libsqlite3.tbd
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Traumatrees
        UIAppFonts:
          - PlaywriteNZBasic.ttf
          - Lato-Light.ttf
          - Lato-Regular.ttf
          - Lato-Bold.ttf
          - Fraunces.ttf
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIUserInterfaceStyle: Automatic
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # The dev backend is plain HTTP on the Mac's loopback; production
        # talks HTTPS only, which ATS allows by default.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Export compliance: the app uses only standard, published encryption
        # (AES-256-GCM, Argon2id, TLS) to protect the user's own data, which
        # qualifies for the exemption. Declaring it here lets every TestFlight
        # build skip the manual export-compliance question. Review before your
        # first public release.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.traumabomen.companion
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        # User-facing version (bump for each TestFlight beta round) and build
        # number (must be unique per upload; bump for every archive you send).
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Automatic signing for on-device runs. Set your team in Xcode
        # (Signing & Capabilities), or set DEVELOPMENT_TEAM below to your
        # 10-char Team ID so it survives `xcodegen generate`. Simulator
        # builds need no signing (pass CODE_SIGNING_ALLOWED=NO on the CLI).
        CODE_SIGN_STYLE: Automatic
        # DEVELOPMENT_TEAM: XXXXXXXXXX
